<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audrey Summer Homework Hub</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:20px}
h1{color:#2b55ff}

.section{
background:#dbeafe;
padding:12px;
border-radius:10px;
margin-bottom:10px;
font-weight:bold;
}

.card{background:white;padding:15px;margin:10px 0;border-radius:10px}

button{margin:5px;padding:8px;cursor:pointer}
select{padding:6px}

.bar{height:10px;background:#e5e7eb;border-radius:5px}
.fill{height:10px;background:#2563eb}

.hidden{display:none}

.tag{
display:inline-block;
background:#e0f2fe;
color:#0369a1;
padding:3px 8px;
border-radius:8px;
font-size:12px;
margin-left:6px;
}
</style>
</head>

<body>

<h1>📚 Audrey Summer Homework Hub</h1>

<div class="section">
📌 SUMMER HOMEWORK 2026 — ALL ASSIGNMENTS BELOW
</div>

<select id="book" onchange="render()"></select>

<div class="card" id="home"></div>

<div class="card">
<button onclick="show('vocab')">Vocabulary</button>
<button onclick="show('reading')">Reading</button>
<button onclick="show('essay')">Essay</button>
<button onclick="show('quiz')">Quiz</button>
</div>

<div id="vocab" class="card hidden"></div>
<div id="reading" class="card hidden"></div>
<div id="essay" class="card hidden"></div>
<div id="quiz" class="card hidden"></div>

<script>

const books={
"City of Ember":{
vocab:["urgent","generator","anticipation"],
reading:["What is problem?","How does Lina help?","Where do they go?"],
essay:"How does curiosity help?",
progress:{v:0,r:0,e:0}
},

"The Rifle":{
vocab:["gunsmith","loyalist","beacon"],
reading:["Why is rifle important?","What mistake happens?","What lesson?"],
essay:"Is power dangerous?",
progress:{v:0,r:0,e:0}
},

"Sammy Keyes":{
vocab:["buffoon","ruckus","bogus"],
reading:["What did Sammy see?","Who is thief?","How solved?"],
essay:"How does mystery get solved?",
progress:{v:0,r:0,e:0}
}

};

let sel=document.getElementById("book");

for(let b in books){
let o=document.createElement("option");
o.value=b;
o.textContent="📘 "+b;
sel.appendChild(o);
}

function show(id){
["home","vocab","reading","essay","quiz"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function render(){

let b=sel.value;
let book=books[b];

let total=book.vocab.length+book.reading.length+1;
let done=book.progress.v+book.progress.r+book.progress.e;
let percent=Math.round((done/total)*100);

document.getElementById("home").innerHTML=`
<h2>📘 ${b} <span class="tag">SUMMER HOMEWORK</span></h2>

<p>📊 Progress</p>
<div class="bar"><div class="fill" style="width:${percent}%"></div></div>

<p>Vocabulary: ${book.progress.v}/${book.vocab.length}</p>
<p>Reading: ${book.progress.r}/${book.reading.length}</p>
<p>Essay: ${book.progress.e}/1</p>

<hr>
<p><b>Homework Tasks:</b></p>
<ul>
<li>Vocabulary Practice</li>
<li>Reading Questions</li>
<li>Essay Writing</li>
<li>Quiz Mode</li>
</ul>
`;

document.getElementById("vocab").innerHTML=
"<h2>📚 Vocabulary</h2>"+book.vocab.map(v=>"• "+v).join("<br>");

document.getElementById("reading").innerHTML=
"<h2>📖 Reading Questions</h2>"+book.reading.map(q=>"• "+q).join("<br>");

document.getElementById("essay").innerHTML=
"<h2>✍️ Essay</h2><p>"+book.essay+"</p>";

document.getElementById("quiz").innerHTML=
"<h2>🧠 Quiz Mode</h2><p>Click start to practice ERB style questions.</p>";
}

sel.onchange=render;
render();

</script>

</body>
</html>
