<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audrey ERB Vocabulary & Comprehension</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --accent: #2563eb;
      --accent2: #0f766e;
      --good: #15803d;
      --bad: #b91c1c;
      --warning: #b45309;
      --border: #d9e2f1;
      --shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4ff 0%, #f8fbff 45%, #f6f8fc 100%);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 22px; }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #dbeafe 0%, #ffffff 58%, #ccfbf1 100%);
    }
    h1 { margin: 0 0 8px; font-size: 2.1rem; }
    h2 { margin: 0 0 12px; font-size: 1.25rem; }
    .sub { color: var(--muted); line-height: 1.6; }
    .card { padding: 20px; margin-bottom: 20px; }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    select, button, input {
      width: 100%;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #c9d6ea;
    }
    button {
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { transform: translateY(-2px); }
    button.secondary { background: var(--accent2); }
    button.gray { background: #475569; }
    button.warning { background: #f59e0b; }
    .summer-section { background: linear-gradient(135deg, #fef3c7, #ecfdf5); border: 2px solid #fcd34d; }
    .question-type { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    .question-word { font-size: 2.1rem; font-weight: 800; margin: 12px 0; }
    .choices { display: grid; gap: 10px; margin-top: 10px; }
    .choice-btn {
      text-align: left;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-weight: 600;
    }
    .choice-btn.correct { background: #ecfdf5; border-color: #86efac; color: var(--good); }
    .choice-btn.wrong { background: #fef2f2; border-color: #fca5a5; color: var(--bad); }
    .feedback { margin-top: 16px; padding: 16px; border-radius: 14px; }
    .feedback.good { background: #ecfdf5; color: var(--good); }
    .feedback.bad { background: #fef2f2; color: var(--bad); }
    .pill { display: inline-block; padding: 6px 12px; background: #eff6ff; color: var(--accent); border-radius: 999px; margin: 4px 6px 4px 0; font-size: 0.9rem; }
    .tiny { font-size: 0.9rem; color: var(--muted); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Audrey ERB Practice Center</h1>
      <p class="sub">Vocabulary + Reading Comprehension • Summer Homework Included</p>
      
      <div class="toolbar">
        <div>
          <label for="practiceType">Practice Type</label>
          <select id="practiceType">
            <option value="vocab">Vocabulary Practice</option>
            <option value="comprehension">Reading Comprehension</option>
          </select>
        </div>
        <div>
          <label for="bookFilter">Book Set</label>
          <select id="bookFilter">
            <option value="all">All Books</option>
            <option value="The Thief Lord">The Thief Lord</option>
            <option value="13 Gifts">13 Gifts</option>
            <option value="Brendan Buckley’s Universe and Everything in It">Brendan Buckley’s Universe</option>
            <option value="Summer">Summer Homework Books</option>
            <option value="City of Ember">City of Ember</option>
            <option value="The Rifle">The Rifle</option>
            <option value="Sammy Keyes and the Hotel Thief">Sammy Keyes</option>
            <option value="Smiles to Go">Smiles to Go</option>
            <option value="Time Travelling with a Hamster">Time Travelling with a Hamster</option>
            <option value="The Winter Room">The Winter Room</option>
            <option value="Woodsong">Woodsong</option>
          </select>
        </div>
        <div>
          <label for="questionCount">Question Count</label>
          <select id="questionCount">
            <option value="5">5 Questions</option>
            <option value="10" selected>10 Questions</option>
            <option value="15">15 Questions</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="startBtn">Start Practice</button>
        </div>
      </div>

      <div class="stats" style="margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;">
        <div class="stat"><div class="label">Score</div><div class="value" id="scoreValue">0</div></div>
        <div class="stat"><div class="label">Question</div><div class="value" id="questionValue">0 / 0</div></div>
        <div class="stat"><div class="label">Accuracy</div><div class="value" id="accuracyValue">0%</div></div>
      </div>
    </section>

    <section class="card summer-section">
      <h2>Summer Homework Added</h2>
      <p class="tiny"><strong>Vocabulary + Reading Comprehension</strong> for all 7 summer books are now available.</p>
    </section>

    <section class="card" id="quizCard">
      <div class="question-type" id="questionType">Ready</div>
      <div class="question-word" id="questionWord">Press Start Practice</div>
      <div class="question-prompt" id="questionPrompt"></div>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback" style="display:none;"></div>
      <div class="row" style="margin-top:20px;display:flex;gap:10px;">
        <button id="nextBtn" class="secondary" disabled>Next Question</button>
        <button id="restartBtn" class="gray">Restart</button>
      </div>
    </section>

    <section class="card">
      <h2>Essay Prompts Reference</h2>
      <div class="tiny" id="essayReference"></div>
    </section>
  </div>

</body>
</html>
